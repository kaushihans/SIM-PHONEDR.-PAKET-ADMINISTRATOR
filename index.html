<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paketshop Pro V8</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f4f6f8;
}

/* DASHBOARD */
.dashboard{
display:grid;
grid-template-columns:repeat(3,1fr);
height:100vh;
}

.box{
display:flex;
justify-content:center;
align-items:center;
font-size:30px;
font-weight:bold;
color:white;
cursor:pointer;
}

.dpd{background:#d60000;}
.gls{background:#0b2a6f;}
.hermes{background:#4aa3ff;}

/* APP */
.app{display:none;padding:10px;}

.header{
padding:15px;
color:white;
font-size:20px;
font-weight:bold;
border-radius:8px;
display:flex;
justify-content:space-between;
align-items:center;
}

.card{
background:white;
padding:10px;
margin:10px 0;
border-radius:8px;
}

input,select,button{
width:100%;
padding:8px;
margin:5px 0;
box-sizing:border-box;
}

.smallbtn{width:auto;padding:5px 10px;}

.warn{background:#b00000 !important;}
</style>
</head>

<body>

<div id="dashboard" class="dashboard">
<div class="box dpd" onclick="openFirma('dpd')">DPD</div>
<div class="box gls" onclick="openFirma('gls')">GLS</div>
<div class="box hermes" onclick="openFirma('hermes')">HERMES</div>
</div>

<div id="app" class="app">

<div id="header" class="header">
<span id="title"></span>
<button onclick="openTrash()">🗑</button>
</div>

<button onclick="back()">⬅ Zurück</button>

<div class="card">

<h3>📦 Paket hinzufügen</h3>

<input id="search" placeholder="Suche Name / ID" oninput="render()">
<input id="name" placeholder="Name">

<select id="size">
<option>XS</option><option>S</option><option>M</option>
<option>L</option><option>XL</option><option>XXL</option>
</select>

<select id="form">
<option>Paket</option><option>Box</option>
<option>Tüte</option><option>Lang</option><option>Flach</option>
</select>

<input id="info" placeholder="Info">

<button onclick="addPackage()">Speichern</button>

</div>

<div class="card" id="stats"></div>

<div id="list"></div>

</div>
<script>

/* ---------------- DATA ---------------- */

let currentFirma = null;

let data = JSON.parse(localStorage.getItem("db")) || {
dpd:{counter:1000,customers:{},trash:[]},
gls:{counter:2000,customers:{},trash:[]},
hermes:{counter:3000,customers:{},trash:[]}
};

function save(){
localStorage.setItem("db",JSON.stringify(data));
}

/* ---------------- NAV ---------------- */

function openFirma(f){
currentFirma = f;

document.getElementById("dashboard").style.display="none";
document.getElementById("app").style.display="block";

document.getElementById("title").innerText = f.toUpperCase();

render();
}

function back(){
document.getElementById("dashboard").style.display="grid";
document.getElementById("app").style.display="none";
}

/* ---------------- PACKAGES ---------------- */

let edit = {name:null,index:null};

/* Werktage Start (Hilfsfunktion später erweitert in Teil 3) */
function addPackage(){

let name = document.getElementById("name").value.trim();
if(!name) return;

let f = data[currentFirma];

if(!f.customers[name]){
f.customers[name] = {
id:f.counter++,
packages:[]
};
}

let pkg = {
size:document.getElementById("size").value,
form:document.getElementById("form").value,
info:document.getElementById("info").value,
time:Date.now()
};

if(edit.name !== null){
f.customers[edit.name].packages[edit.index] = pkg;
edit = {name:null,index:null};
} else {
f.customers[name].packages.push(pkg);
}

save();

document.getElementById("name").value="";
document.getElementById("info").value="";

render();
}

/* ---------------- RENDER ---------------- */

function render(){

let f = data[currentFirma];
let search = document.getElementById("search").value.toLowerCase();

let list = document.getElementById("list");
let stats = document.getElementById("stats");

list.innerHTML="";

let customers = f.customers;

let total = 0;

for(let name in customers){

let c = customers[name];

if(search &&
!name.toLowerCase().includes(search) &&
!String(c.id).includes(search)) continue;

total += c.packages.length;

let html = `<div class="card">
<h3>${name}</h3>
<b>ID ${c.id}</b><br><br>`;

c.packages.forEach((p,i)=>{
html += `
<div style="border-left:4px solid #ccc;padding:5px;margin:5px 0;">
<b>Paket ${i+1}</b><br>
${p.size} | ${p.form}<br>
${p.info || ""}
<br>
<button class="smallbtn" onclick="editPackage('${name}',${i})">✏</button>
</div>
`;
});

html += `
<button onclick="deleteCustomer('${name}')">🗑 Löschen</button>
</div>`;

list.innerHTML += html;
}

stats.innerHTML = `
👥 Kunden: ${Object.keys(customers).length}<br>
📦 Pakete: ${total}
`;
}

/* ---------------- EDIT ---------------- */

function editPackage(name,index){

let f = data[currentFirma];
let p = f.customers[name].packages[index];

document.getElementById("name").value = name;
document.getElementById("size").value = p.size;
document.getElementById("form").value = p.form;
document.getElementById("info").value = p.info;

edit = {name,index};
}

/* ---------------- DELETE ---------------- */

function deleteCustomer(name){

if(!confirm("In Papierkorb verschieben?")) return;

let f = data[currentFirma];

f.trash.push({
name,
data:f.customers[name],
time:Date.now()
});

delete f.customers[name];

save();
render();
}

</script>
<script>

/* ---------------- WERKTAGE ---------------- */

function workdays(start){
let count = 0;
let d = new Date(start);

while(d.getTime() < Date.now()){
let day = d.getDay(); // 0 So, 6 Sa

if(day !== 0 && day !== 6){
count++;
}

d.setDate(d.getDate() + 1);
}

return count;
}

/* STATUS */
function getStatus(p){
let days = workdays(p.time);

if(days >= 10) return "red";
if(days >= 8) return "orange";
return "green";
}

/* ---------------- DELETE + TRASH ---------------- */

function deleteCustomer(name){

if(!confirm("In Papierkorb verschieben?")) return;

let f = data[currentFirma];

f.trash.push({
name,
data:JSON.parse(JSON.stringify(f.customers[name])),
time:Date.now()
});

delete f.customers[name];

save();
render();
}

/* ---------------- TRASH UI ---------------- */

function openTrash(){

let f = data[currentFirma];

f.trash = f.trash.filter(t => Date.now() - t.time < 86400000);

let html = `<div class="card"><h3>🗑 Papierkorb</h3></div>`;

f.trash.forEach((t,i)=>{
html += `
<div class="card">
<b>${t.name}</b><br>
<button onclick="restore(${i})">♻ Wiederherstellen</button>
</div>
`;
});

document.getElementById("list").innerHTML = html;
}

/* RESTORE */
function restore(i){

let f = data[currentFirma];

let item = f.trash[i];

f.customers[item.name] = item.data;

f.trash.splice(i,1);

save();
openTrash();
}

/* ---------------- STATS + WARN SYSTEM ---------------- */

function render(){

let f = data[currentFirma];
let search = document.getElementById("search").value.toLowerCase();

let list = document.getElementById("list");
let stats = document.getElementById("stats");

list.innerHTML="";

let customers = f.customers;

let total = 0;
let redCount = 0;
let orangeCount = 0;
let greenCount = 0;

for(let name in customers){

let c = customers[name];

if(search &&
!name.toLowerCase().includes(search) &&
!String(c.id).includes(search)) continue;

let html = `<div class="card">
<h3>${name}</h3>
<b>ID ${c.id}</b><br><br>`;

c.packages.forEach((p,i)=>{

let status = getStatus(p);

if(status==="red") redCount++;
if(status==="orange") orangeCount++;
if(status==="green") greenCount++;

total++;

html += `
<div style="border-left:6px solid ${status};padding:5px;margin:5px 0;">
<b>Paket ${i+1}</b><br>
${p.size} | ${p.form}<br>
${p.info || ""}
<br>
<button onclick="editPackage('${name}',${i})">✏</button>
</div>
`;
});

html += `
<button onclick="deleteCustomer('${name}')">🗑 Löschen</button>
</div>`;

list.innerHTML += html;
}

/* ---------------- WARN BANNER ---------------- */

let header = document.getElementById("header");
header.classList.remove("warn");

let warnText = "";

if(redCount > 0){
header.classList.add("warn");
warnText = ` ⚠ ${redCount} überfällige Pakete`;
}

/* ---------------- STATS ---------------- */

stats.innerHTML = `
👥 Kunden: ${Object.keys(customers).length}<br>
📦 Pakete: ${total}<br><br>

🟢 Normal: ${greenCount}<br>
🟡 Warnung: ${orangeCount}<br>
🔴 Überfällig: ${redCount}<br><br>

🗑 Papierkorb: ${f.trash.length || 0}
`;

/* Header Text bleibt stabil */
document.getElementById("title").innerText = currentFirma.toUpperCase() + warnText;

}

</script>
